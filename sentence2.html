<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓国語カード</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#ffffff;
  color:#000000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  width:100%;
  max-width:100%;
  height:100vh;
  padding:50px 20px;
  border-radius:0;
  background:#ffffff;
  text-align:center;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.jp {
  font-size:36px;
  line-height:1.9;
  font-weight:700;
  margin-bottom:30px;
}

.kana {
  font-size:30px;
  margin-top:20px;
  display:none;
}

button {
  margin-top:20px;
  padding:16px;
  border:none;
  border-radius:15px;
  background:#000;
  color:#fff;
  font-size:20px;
}

.next {
  background:#22c55e;
}
</style>
</head>

<body>

<div class="card">
  <div class="jp" id="jp"></div>
  <div class="kana" id="kana"></div>
  <button onclick="toggle()">答え</button>
  <button class="next" onclick="next()">次へ</button>
</div>

<script>

const data = [

/* ===== パート1 ===== */
["今日は朝6時に起きた","オヌル アチム ヨソッシエ イロナッソ"],
["顔を洗った","セスヘッソ"],
["朝ごはんを食べた","アチム モゴッソ"],
["コーヒーを飲んだ","コピルル マショッソ"],
["仕事に行った","イルハロ カッソ"],
["カフェで勉強した","カペエソ コンブヘッソ"],
["今仕事している","チグム イルハゴ イッソ"],
["ご飯を食べている","パプ モゴ イッソ"],
["今スマホ見ている","チグム ポン ボゴ イッソ"],

/* ===== パート2 ===== */
["トイレはどこですか？","ファジャンシレ オディエヨ？"],
["トイレはどこにありますか？","ファジャンシレ オディエ イッソヨ？"],
["誕生日はいつですか？","センイル オンジェエヨ？"],
["いつ韓国に行きますか？","オンジェ ハングゲ カヨ？"],
["どうやって行きますか？","オットッケ カヨ？"],
["どうやって食べますか？","オットッケ モゴヨ？"]

];

let i = 0;

function show(){
  document.getElementById("jp").textContent = data[i][0];
  document.getElementById("kana").textContent = data[i][1];
  document.getElementById("kana").style.display = "none";
}

function toggle(){
  const k = document.getElementById("kana");
  k.style.display = k.style.display === "none" ? "block" : "none";
}

function next(){
  i = (i + 1) % data.length;
  show();
}

show();

</script>

</body>
</html>
