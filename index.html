<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>韓国語学習</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&display=swap');
  :root {
    --bg:#0f0f13;--surface:#1a1a24;--card:#22222f;--border:#2e2e40;
    --accent:#ff6b35;--accent2:#ffc857;--text:#f0efe8;--muted:#888899;
    --correct:#4ade80;--wrong:#f87171;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Zen Kaku Gothic New',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom);}
  header{padding:52px 24px 0;text-align:center;}
  header h1{font-size:1.5rem;font-weight:900;color:var(--accent);}
  header p{font-size:0.72rem;color:var(--muted);margin-top:2px;}
  .badge{display:inline-flex;align-items:center;gap:4px;background:#14532d;color:var(--correct);font-size:0.65rem;padding:3px 10px;border-radius:20px;margin-top:6px;}
  .tabs{display:flex;margin:16px 12px 0;background:var(--surface);border-radius:14px;padding:4px;}
  .tab-btn{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:0.72rem;font-weight:700;padding:10px 2px;border-radius:10px;cursor:pointer;transition:all 0.2s;}
  .tab-btn.active{background:var(--accent);color:white;}
  .page{display:none;padding:16px 14px 120px;}
  .page.active{display:block;}

  /* カード */
  .progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:8px;}
  .progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;}
  .progress-text{text-align:center;font-size:0.72rem;color:var(--muted);margin-bottom:14px;}
  .flashcard-wrap{perspective:1000px;height:230px;margin-bottom:18px;cursor:pointer;}
  .flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);}
  .flashcard-inner.flipped{transform:rotateY(180deg);}
  .card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;border:1px solid var(--border);}
  .card-front{background:var(--card);}
  .card-back{background:linear-gradient(135deg,#1f1f2e,#2a1f2e);transform:rotateY(180deg);}
  .card-label{font-size:0.62rem;color:var(--muted);letter-spacing:0.1em;}
  .card-ja{font-size:1.5rem;font-weight:900;text-align:center;color:var(--text);line-height:1.4;}
  .card-kana{font-size:2rem;font-weight:900;text-align:center;color:var(--accent2);line-height:1.4;}
  .card-hint{font-size:0.68rem;color:var(--muted);margin-top:6px;}
  .card-nav{display:flex;justify-content:center;align-items:center;gap:24px;margin-bottom:14px;}
  .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:1.4rem;width:52px;height:52px;border-radius:50%;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;}
  .nav-btn:active{transform:scale(0.9);background:var(--accent);}
  .nav-btn:disabled{opacity:0.2;cursor:default;}
  .star-btn{background:none;border:none;font-size:1.6rem;cursor:pointer;padding:4px;}
  .action-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:14px;}
  .small-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:0.75rem;padding:8px 16px;border-radius:20px;cursor:pointer;}
  .small-btn.on{background:var(--accent);border-color:var(--accent);color:white;}

  /* クイズ */
  .quiz-start{text-align:center;padding:40px 0;}
  .quiz-start h2{font-size:1.2rem;margin-bottom:8px;}
  .quiz-start p{color:var(--muted);font-size:0.83rem;margin-bottom:24px;line-height:1.7;}
  .start-btn{background:var(--accent);color:white;border:none;font-family:inherit;font-size:1rem;font-weight:700;padding:14px 36px;border-radius:14px;cursor:pointer;}
  .qpbar{height:4px;background:var(--border);border-radius:2px;margin-bottom:20px;overflow:hidden;}
  .qpfill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;}
  .quiz-q-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 16px;text-align:center;margin-bottom:16px;}
  .quiz-q-label{font-size:0.62rem;color:var(--muted);letter-spacing:0.1em;margin-bottom:10px;}
  .quiz-q-text{font-size:1.4rem;font-weight:900;line-height:1.5;}
  .choices{display:grid;gap:10px;}
  .choice-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:0.92rem;padding:15px;border-radius:14px;cursor:pointer;text-align:left;transition:all 0.15s;line-height:1.4;}
  .choice-btn.correct{background:#14532d;border-color:var(--correct);color:var(--correct);}
  .choice-btn.wrong{background:#450a0a;border-color:var(--wrong);color:var(--wrong);}
  .choice-btn:disabled{cursor:default;}
  .quiz-result{text-align:center;padding:40px 0;}
  .result-score{font-size:4rem;font-weight:900;color:var(--accent);line-height:1;}
  .result-label{color:var(--muted);font-size:0.9rem;margin:8px 0 20px;}
  .result-msg{font-size:1.1rem;margin-bottom:28px;}

  /* 苦手 */
  .weak-empty{text-align:center;color:var(--muted);padding:60px 0;font-size:0.9rem;line-height:2;}
  .weak-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
  .wja{font-size:1rem;font-weight:700;}
  .wkana{font-size:0.85rem;color:var(--accent2);margin-top:3px;}
  .remove-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:0.7rem;padding:5px 10px;border-radius:8px;cursor:pointer;white-space:nowrap;}
</style>
</head>
<body>
<header>
  <h1>🇰🇷 韓国語 活用練習</h1>
  <p>日本語 → カナルビで覚える</p>
  <span class="badge">✓ オフライン対応 348枚</span>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('flash',this)">📇 カード</button>
  <button class="tab-btn" onclick="switchTab('quiz',this)">🎯 クイズ</button>
  <button class="tab-btn" onclick="switchTab('weak',this)">⭐ 苦手</button>
</div>

<div id="flash" class="page active">
  <div class="action-row">
    <button class="small-btn on" id="btnAll" onclick="setFilter('all',this)">全部（348）</button>
    <button class="small-btn" id="btnWeak" onclick="setFilter('weak',this)">⭐ 苦手のみ</button>
    <button class="small-btn" onclick="shuffleCards()">🔀 シャッフル</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pFill"></div></div>
  <div class="progress-text" id="pText"></div>
  <div class="flashcard-wrap" onclick="flipCard()">
    <div class="flashcard-inner" id="fcInner">
      <div class="card-face card-front">
        <div class="card-label">日本語</div>
        <div class="card-ja" id="cJa"></div>
        <div class="card-hint">タップしてカナルビを見る ↩</div>
      </div>
      <div class="card-face card-back">
        <div class="card-label">カナルビ（読み方）</div>
        <div class="card-kana" id="cKana"></div>
      </div>
    </div>
  </div>
  <div class="card-nav">
    <button class="nav-btn" id="prevBtn" onclick="prevCard()">‹</button>
    <button class="star-btn" id="starBtn" onclick="toggleWeak()">☆</button>
    <button class="nav-btn" id="nextBtn" onclick="nextCard()">›</button>
  </div>
</div>

<div id="quiz" class="page">
  <div id="qStart" class="quiz-start">
    <h2>🎯 クイズ</h2>
    <p>日本語を見てカナルビを選ぼう<br>全10問・4択<br><br><span style="font-size:0.78rem">⭐苦手登録した単語が優先で出ます</span></p>
    <button class="start-btn" onclick="startQuiz()">スタート</button>
  </div>
  <div id="qGame" style="display:none">
    <div class="qpbar"><div class="qpfill" id="qpFill"></div></div>
    <div class="quiz-q-box">
      <div class="quiz-q-label">このカナルビは？</div>
      <div class="quiz-q-text" id="qJa"></div>
    </div>
    <div class="choices" id="choices"></div>
  </div>
  <div id="qResult" class="quiz-result" style="display:none">
    <div class="result-score" id="rScore"></div>
    <div class="result-label">/ 10問正解</div>
    <div class="result-msg" id="rMsg"></div>
    <button class="start-btn" onclick="startQuiz()">もう一度</button>
  </div>
</div>

<div id="weak" class="page">
  <div style="font-size:0.8rem;color:var(--muted);margin-bottom:14px">⭐ カード画面でマークした単語</div>
  <div id="weakList"></div>
</div>

// 苦手
let W=new Set(JSON.parse(localStorage.getItem('wk')||'[]'));
function saveW(){localStorage.setItem('wk',JSON.stringify([...W]));}

// カード
let deck=[...D],idx=0,flipped=false,fmode='all';
function setFilter(m,btn){
  fmode=m;
  document.querySelectorAll('.action-row .small-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  deck=m==='weak'?D.filter(c=>W.has(c.j)):[...D];
  if(deck.length===0){alert('苦手登録した単語がまだありません。\n☆をタップして登録してください。');setFilter('all',document.getElementById('btnAll'));return;}
  idx=0;renderCard();
}
function shuffleCards(){deck=deck.sort(()=>Math.random()-0.5);idx=0;renderCard();}
function renderCard(){
  if(!deck.length)return;
  const c=deck[idx];
  document.getElementById('cJa').textContent=c.j;
  document.getElementById('cKana').textContent=c.k;
  const pct=((idx+1)/deck.length)*100;
  document.getElementById('pFill').style.width=pct+'%';
  document.getElementById('pText').textContent=`${idx+1} / ${deck.length}`;
  document.getElementById('prevBtn').disabled=idx===0;
  document.getElementById('nextBtn').disabled=idx===deck.length-1;
  document.getElementById('fcInner').classList.remove('flipped');
  flipped=false;
  document.getElementById('starBtn').textContent=W.has(c.j)?'⭐':'☆';
}
function flipCard(){flipped=!flipped;document.getElementById('fcInner').classList.toggle('flipped',flipped);}
function nextCard(){if(idx<deck.length-1){idx++;renderCard();}}
function prevCard(){if(idx>0){idx--;renderCard();}}
function toggleWeak(){
  const c=deck[idx];
  W.has(c.j)?W.delete(c.j):W.add(c.j);
  saveW();renderCard();renderWeakList();
}

// クイズ
let qqs=[],qidx=0,qscore=0,qans=false;
function startQuiz(){
  const wc=D.filter(c=>W.has(c.j)).sort(()=>Math.random()-0.5).slice(0,5);
  const nc=D.filter(c=>!W.has(c.j)).sort(()=>Math.random()-0.5).slice(0,10);
  qqs=[...wc,...nc].sort(()=>Math.random()-0.5).slice(0,10).map(c=>{
    const wr=D.filter(x=>x.k!==c.k).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.k);
    return{...c,choices:[c.k,...wr].sort(()=>Math.random()-0.5)};
  });
  qidx=0;qscore=0;
  document.getElementById('qStart').style.display='none';
  document.getElementById('qResult').style.display='none';
  document.getElementById('qGame').style.display='block';
  renderQ();
}
function renderQ(){
  qans=false;
  const q=qqs[qidx];
  document.getElementById('qpFill').style.width=`${(qidx/10)*100}%`;
  document.getElementById('qJa').textContent=q.j;
  document.getElementById('choices').innerHTML=q.choices.map(ch=>
    `<button class="choice-btn" onclick="ansQ(this,'${ch.replace(/'/g,"\\'")}','${q.k.replace(/'/g,"\\'")}')">${ch}</button>`
  ).join('');
}
function ansQ(btn,chosen,correct){
  if(qans)return;qans=true;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add('correct');
    else if(b===btn&&chosen!==correct)b.classList.add('wrong');
  });
  if(chosen===correct)qscore++;
  setTimeout(()=>{qidx++;qidx<10?renderQ():showResult();},900);
}
function showResult(){
  document.getElementById('qGame').style.display='none';
  document.getElementById('qResult').style.display='block';
  document.getElementById('rScore').textContent=qscore;
  document.getElementById('rMsg').textContent=['もう一度挑戦！💪','いい調子！😊','素晴らしい！🎉','完璧！🏆'][qscore<=3?0:qscore<=6?1:qscore<=9?2:3];
}

// 苦手リスト
function renderWeakList(){
  const el=document.getElementById('weakList');
  const list=D.filter(c=>W.has(c.j));
  if(!list.length){el.innerHTML='<div class="weak-empty">まだ苦手登録した単語がありません<br><br>カード画面の ☆ をタップして<br>苦手な単語を登録しましょう</div>';return;}
  el.innerHTML=`<div style="font-size:0.78rem;color:var(--muted);margin-bottom:12px">${list.length}件登録中</div>`+
    list.map(c=>`<div class="weak-card"><div><div class="wja">${c.j}</div><div class="wkana">${c.k}</div></div><button class="remove-btn" onclick="rmW('${c.j.replace(/'/g,"\\'")}')">解除</button></div>`).join('');
}
function rmW(ja){W.delete(ja);saveW();renderWeakList();document.getElementById('starBtn').textContent=W.has(deck[idx].j)?'⭐':'☆';}

// タブ
function switchTab(tab,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  btn.classList.add('active');
  if(tab==='weak')renderWeakList();
}

renderCard();
